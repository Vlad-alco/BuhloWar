<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Knob — BuhloWar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0e14;
    color: #c0c8d4;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.knob-container {
    position: relative;
    width: 260px;
    height: 260px;
}

.knob-svg {
    width: 100%;
    height: 100%;
}

/* Деления и подписи генерируются JS */
</style>
</head>
<body>

<div class="knob-container">
    <svg class="knob-svg" viewBox="0 0 260 260" id="knobSvg">
        <defs>
            <!-- Металлический градиент для ручки -->
            <radialGradient id="knobMetal" cx="45%" cy="40%" r="55%">
                <stop offset="0%" style="stop-color:#3a3f4a"/>
                <stop offset="40%" style="stop-color:#2a2f38"/>
                <stop offset="80%" style="stop-color:#1a1e26"/>
                <stop offset="100%" style="stop-color:#14181f"/>
            </radialGradient>
            <!-- Блик на ручке -->
            <radialGradient id="knobHighlight" cx="38%" cy="35%" r="40%">
                <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
                <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
            </radialGradient>
            <!-- Градиент скоса (facet) для 3D эффекта -->
            <radialGradient id="knobEdge" cx="50%" cy="50%" r="50%">
                <stop offset="85%" style="stop-color:rgba(255,255,255,0)"/>
                <stop offset="95%" style="stop-color:rgba(255,255,255,0.04)"/>
                <stop offset="100%" style="stop-color:rgba(0,0,0,0.3)"/>
            </radialGradient>
            <!-- Свечение под ручкой -->
            <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:rgba(0,240,255,0.06)"/>
                <stop offset="100%" style="stop-color:rgba(0,240,255,0)"/>
            </radialGradient>
        </defs>

        <!-- Подложка с свечением -->
        <circle cx="130" cy="130" r="120" fill="url(#baseGlow)"/>

        <!-- Внешнее кольцо (кольцо шкалы) -->
        <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

        <!-- Деления и подписи генерируются JS (группа tickGroup) -->
        <g id="tickGroup"></g>

        <!-- Шайба ручки — тень -->
        <circle cx="130" cy="132" r="55" fill="rgba(0,0,0,0.4)" filter="blur(4px)"/>

        <!-- Шайба ручки — основное тело -->
        <circle cx="130" cy="130" r="55" fill="url(#knobMetal)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

        <!-- Насечки на ручке (knurling) -->
        <g id="knurlGroup" opacity="0.3"></g>

        <!-- Блик на ручке -->
        <circle cx="130" cy="130" r="55" fill="url(#knobHighlight)"/>

        <!-- Скос края ручки -->
        <circle cx="130" cy="130" r="55" fill="url(#knobEdge)"/>

        <!-- Центральная втулка -->
        <circle cx="130" cy="130" r="12" fill="#1a1e26" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="130" cy="130" r="8" fill="#0d1015" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

        <!-- Белая линия-указатель на ручке -->
        <g id="indicatorGroup">
            <line x1="130" y1="78" x2="130" y2="95" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="130" y1="78" x2="130" y2="95" stroke="rgba(0,240,255,0.4)" stroke-width="3.5" stroke-linecap="round" filter="blur(2px)"/>
        </g>

        <!-- Цифровое значение под ручкой -->
        <text x="130" y="210" id="knobValueText" fill="#00f0ff"
              font-family="'Courier New', monospace" font-size="20" font-weight="700"
              text-anchor="middle" dominant-baseline="middle"
              filter="drop-shadow(0 0 6px rgba(0,240,255,0.5))">3000</text>
        <text x="130" y="226" fill="rgba(0,240,255,0.4)"
              font-family="'Courier New', monospace" font-size="8" font-weight="400"
              text-anchor="middle" dominant-baseline="middle"
              letter-spacing="0.2em">WATT</text>
    </svg>
</div>

<script>
    // === Настройки ===
    const MIN_POWER = 100;
    const MAX_POWER = 7000;
    const STEP_MAJOR = 1000;     // крупные деления (1 кВт)
    const STEP_MINOR = 100;      // мелкие деления (100 Вт)
    const START_ANGLE = 135;     // начальный угол (нижний левый)
    const SWEEP_ANGLE = 270;     // sweep дуги (градусы)
    const TICK_OUTER_R = 115;    // радиус внешнего края делений
    const TICK_MAJOR_LEN = 12;   // длина крупного деления
    const TICK_MINOR_LEN = 6;    // длина мелкого деления
    const LABEL_R = 100;         // радиус подписей (наружу от делений... нет, внутрь от них)

    const CX = 130, CY = 130;
    let currentPower = 3000;

    // === Генерация насечек на ручке (knurling) ===
    function createKnurling() {
        const g = document.getElementById('knurlGroup');
        const ns = 'http://www.w3.org/2000/svg';
        const count = 60; // количество насечек
        const innerR = 49, outerR = 54;

        for (let i = 0; i < count; i++) {
            const angle = (i / count) * 360;
            const rad = angle * Math.PI / 180;
            const x1 = CX + innerR * Math.cos(rad);
            const y1 = CY + innerR * Math.sin(rad);
            const x2 = CX + outerR * Math.cos(rad);
            const y2 = CY + outerR * Math.sin(rad);

            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', 'rgba(255,255,255,0.5)');
            line.setAttribute('stroke-width', '0.5');
            g.appendChild(line);
        }
    }

    // === Генерация делений и подписей ===
    function createTicks() {
        const g = document.getElementById('tickGroup');
        const ns = 'http://www.w3.org/2000/svg';
        const totalSteps = (MAX_POWER - MIN_POWER) / STEP_MINOR;

        for (let i = 0; i <= totalSteps; i++) {
            const power = MIN_POWER + i * STEP_MINOR;
            const frac = i / totalSteps;
            const angle = START_ANGLE + frac * SWEEP_ANGLE;
            const rad = angle * Math.PI / 180;

            const isMajor = (power % STEP_MAJOR === 0);
            const tickLen = isMajor ? TICK_MAJOR_LEN : TICK_MINOR_LEN;

            // Деления: от внешнего края внутрь
            const x1 = CX + TICK_OUTER_R * Math.cos(rad);
            const y1 = CY + TICK_OUTER_R * Math.sin(rad);
            const x2 = CX + (TICK_OUTER_R - tickLen) * Math.cos(rad);
            const y2 = CY + (TICK_OUTER_R - tickLen) * Math.sin(rad);

            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.18)');
            line.setAttribute('stroke-width', isMajor ? '1.8' : '0.8');
            line.setAttribute('stroke-linecap', 'round');
            g.appendChild(line);

            // Подписи для крупных делений — значения НАРУЖУ
            if (isMajor) {
                const labelR = TICK_OUTER_R + 14; // outside the ticks
                const lx = CX + labelR * Math.cos(rad);
                const ly = CY + labelR * Math.sin(rad);

                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', lx);
                text.setAttribute('y', ly);
                text.setAttribute('fill', 'rgba(255,255,255,0.55)');
                text.setAttribute('font-family', "'Courier New', monospace");
                text.setAttribute('font-size', '11');
                text.setAttribute('font-weight', '600');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');

                // Поворачиваем текст чтобы читался снаружи (радиально)
                // Для левой полусферы (+90..+270° от начального угла) переворачиваем
                const textAngle = angle;
                // Если текст в нижней-левой части (135-315° нативных), он будет вверх ногами
                // Поэтому переворачиваем на 180° для лучшей читаемости
                if (textAngle > 180 && textAngle < 360) {
                    text.setAttribute('transform',
                        'rotate(' + (textAngle - 180) + ', ' + lx + ', ' + ly + ')');
                } else {
                    text.setAttribute('transform',
                        'rotate(' + textAngle + ', ' + lx + ', ' + ly + ')');
                }

                const label = power >= 1000 ? (power / 1000) + 'k' : power.toString();
                text.textContent = label;
                g.appendChild(text);
            }
        }
    }

    // === Обновление положения ручки ===
    function updateKnob(power) {
        const clamped = Math.max(MIN_POWER, Math.min(MAX_POWER, power));
        const frac = (clamped - MIN_POWER) / (MAX_POWER - MIN_POWER);
        const angle = START_ANGLE + frac * SWEEP_ANGLE;

        // Поворот группы указателя (белая линия)
        const indicator = document.getElementById('indicatorGroup');
        // Указатель нарисован на 0° (верх), нужно повернуть на angle
        // Но 0° в SVG = верх, а START_ANGLE=135° = нижний левый
        // Указатель должен быть на angle от 0° по часовой стрелке от верха
        indicator.style.transformOrigin = CX + 'px ' + CY + 'px';
        indicator.style.transform = 'rotate(' + angle + 'deg)';
        indicator.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';

        // Цвет значения
        const valEl = document.getElementById('knobValueText');
        if (clamped >= 6000) {
            valEl.setAttribute('fill', '#ff6600');
            valEl.setAttribute('filter', 'drop-shadow(0 0 6px rgba(255,102,0,0.5))');
        } else {
            valEl.setAttribute('fill', '#00f0ff');
            valEl.setAttribute('filter', 'drop-shadow(0 0 6px rgba(0,240,255,0.5))');
        }

        // Обновляем текст
        valEl.textContent = clamped;
    }

    // === Публичная функция ===
    function setPower(power) {
        currentPower = power;
        updateKnob(currentPower);
    }

    // === Инициализация ===
    createKnurling();
    createTicks();
    setPower(3000);

    // Для ручного теста в консоли браузера: setPower(5000)
</script>

</body>
</html>
